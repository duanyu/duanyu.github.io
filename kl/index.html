<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KL Divergence in LLM Finetuning</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --red-color: #e74c3c; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; line-height: 1.6; color: var(--primary-color); background-color: var(--bg-color); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .lang-switch { text-align: right; margin-bottom: 20px; }
        button { cursor: pointer; padding: 5px 15px; border: 1px solid var(--primary-color); background: white; border-radius: 4px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .visualization { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin: 30px 0; }
        .svg-container { background: #fdfdfd; border: 1px solid #eee; padding: 20px; border-radius: 8px; width: 350px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button onclick="setLang('zh')">中文</button>
        <button onclick="setLang('en')">English</button>
    </div>

    <h1 id="title">Forward KL 与 Reverse KL 的区别</h1>
    <p id="intro">在 LLM 微调中，KL 散度用于衡量微调模型与基础模型的分布差异。</p>

    <div class="visualization">
        <div class="svg-container">
            <h3 id="fwd-title">Forward KL (Mode-Covering)</h3>
            <svg viewBox="0 0 300 200" width="100%" height="200">
                <path d="M 20 180 C 60 180, 60 50, 90 50 C 120 50, 120 180, 150 180 C 180 180, 180 50, 210 50 C 240 50, 240 180, 280 180" fill="none" stroke="#3498db" stroke-width="3" stroke-dasharray="5,5"/>
                <path d="M 20 180 C 100 180, 100 90, 150 90 C 200 90, 200 180, 280 180" fill="none" stroke="#e74c3c" stroke-width="3"/>
                <line x1="10" y1="180" x2="290" y2="180" stroke="#333" stroke-width="2"/>
            </svg>
            <p id="fwd-desc" style="font-size: 0.8rem;">试图覆盖基础模型的所有模式。</p>
        </div>
        <div class="svg-container">
            <h3 id="rev-title">Reverse KL (Mode-Seeking)</h3>
            <svg viewBox="0 0 300 200" width="100%" height="200">
                <path d="M 20 180 C 60 180, 60 50, 90 50 C 120 50, 120 180, 150 180 C 180 180, 180 50, 210 50 C 240 50, 240 180, 280 180" fill="none" stroke="#3498db" stroke-width="3" stroke-dasharray="5,5"/>
                <path d="M 20 180 L 140 180 C 170 180, 180 50, 210 50 C 240 50, 250 180, 280 180" fill="none" stroke="#e74c3c" stroke-width="3"/>
                <line x1="10" y1="180" x2="290" y2="180" stroke="#333" stroke-width="2"/>
            </svg>
            <p id="rev-desc" style="font-size: 0.8rem;">聚焦于基础模型的一个最佳模式。</p>
        </div>
    </div>
</div>

<script>
    const dict = {
        zh: { title: "Forward KL 与 Reverse KL 的区别", intro: "在 LLM 微调中，KL 散度用于衡量微调模型与基础模型的分布差异。", fwd_t: "Forward KL (模式覆盖)", fwd_d: "试图覆盖基础模型的所有模式。", rev_t: "Reverse KL (模式寻求)", rev_d: "聚焦于基础模型的一个最佳模式。" },
        en: { title: "Forward KL vs Reverse KL", intro: "In LLM finetuning, KL divergence measures the distribution shift between the tuned and base models.", fwd_t: "Forward KL (Mode-Covering)", fwd_d: "Tries to cover all modes of the base model.", rev_t: "Reverse KL (Mode-Seeking)", rev_d: "Focuses on one optimal mode of the base model." }
    };
    function setLang(lang) {
        document.getElementById('title').innerText = dict[lang].title;
        document.getElementById('intro').innerText = dict[lang].intro;
        document.getElementById('fwd-title').innerText = dict[lang].fwd_t;
        document.getElementById('fwd-desc').innerText = dict[lang].fwd_d;
        document.getElementById('rev-title').innerText = dict[lang].rev_t;
        document.getElementById('rev-desc').innerText = dict[lang].rev_d;
    }
</script>
</body>
</html>
